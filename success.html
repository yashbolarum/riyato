<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Application Received | Riyato</title>
  <meta name="description" content="Thanks for applying. Riyato will review your application and follow up if we can help.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #070d1d;
      --bg-2: #0a1226;
      --bg-3: #162a58;
      --text: #eef1f8;
      --muted: #aab2cb;
      --accent: #e9b44c;
      --card: rgba(255,255,255,.04);
      --card-border: rgba(255,255,255,.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      background: radial-gradient(120% 140% at 50% 0%, var(--bg-3) 0%, var(--bg-2) 52%, var(--bg-1) 100%);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .panel {
      width: min(720px, 100%);
      border: 1px solid var(--card-border);
      background: var(--card);
      border-radius: 22px;
      padding: 44px 34px;
      text-align: center;
      box-shadow: 0 24px 80px -45px rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: riseIn .55s cubic-bezier(.2,.75,.2,1);
    }

    .kicker {
      margin: 0 0 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(34px, 6vw, 52px);
      line-height: 1.05;
      letter-spacing: -.02em;
    }

    .accent { color: var(--accent); }

    .lead {
      margin: 24px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.7;
    }

    .actions {
      margin-top: 34px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      font-weight: 700;
      border-radius: 11px;
      padding: 13px 20px;
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
      white-space: nowrap;
    }

    .btn-primary {
      color: #0a1226;
      background: var(--accent);
      box-shadow: 0 12px 28px -10px rgba(233,180,76,.45);
    }

    .btn-primary:hover { transform: translateY(-2px); background: #f1c668; }

    .btn-secondary {
      color: var(--text);
      border: 1px solid #314062;
      background: rgba(255,255,255,.02);
    }

    .btn-secondary:hover { transform: translateY(-2px); border-color: #4a5a82; }

    .note {
      margin-top: 20px;
      color: #8f9ab9;
      font-size: 14px;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="panel">
    <p class="kicker">Application Received</p>
    <h1>Thanks, you are <span class="accent">in.</span></h1>
    <p class="lead">
      We will have a look at your application and we will reach out if we think we can help you.
    </p>

    <div class="actions">
      <a href="/" class="btn btn-primary">Back to Riyato</a>
      <a href="mailto:hello@riyato.com" class="btn btn-secondary">Contact Us</a>
    </div>

    <p class="note">If your situation is urgent, email hello@riyato.com and include your company name.</p>
  </main>
</body>
</html>
